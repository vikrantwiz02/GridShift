# GridShift — reverse proxy for Tailscale HTTPS Funnel
#
# Traffic path:
#   Browser
#   → Cloudflare (SSL, Host: gridshift.vikrantkumar.site)
#     [Transform Rule adds X-GridShiftHost header]
#     [Origin Rule rewrites Host → fusion-virtual-machine.taila689d6.ts.net]
#   → Tailscale HTTPS Funnel → Apache HTTP :80
#   → Frontend :3020 or API :8280 (routed by path)
#
# /api/* → uvicorn FastAPI :8280  (strip /api prefix)
# /*     → serve static React  :3020

<VirtualHost *:80>
    ServerName gridshift.vikrantkumar.site

    RewriteEngine On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"
    ProxyTimeout 60

    # ── WebSocket upgrade for /api ───────────────────────────────────────────
    RewriteCond %{HTTP:Upgrade}    websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade   [NC]
    RewriteRule ^/api/?(.*)        ws://127.0.0.1:8280/$1 [P,L]

    # ── /api/* → FastAPI backend (strip /api prefix) ─────────────────────────
    RewriteRule ^/api/?(.*)        http://127.0.0.1:8280/$1 [P,L]

    # ── Everything else → React SPA ──────────────────────────────────────────
    ProxyPass        / http://127.0.0.1:3020/
    ProxyPassReverse / http://127.0.0.1:3020/

    ProxyPassReverse /api/ http://127.0.0.1:8280/

    ErrorLog  ${APACHE_LOG_DIR}/gridshift-error.log
    CustomLog ${APACHE_LOG_DIR}/gridshift-access.log combined
</VirtualHost>
